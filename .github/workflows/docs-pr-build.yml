name: Docs PR Build

# Runs on every PR. Performs the same build the deploy workflow does (without
# deploying), so `onBrokenLinks: 'throw'` and the llms.txt drift guard catch
# problems BEFORE merge rather than at deploy time.

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Verify llms.txt artifacts are up to date
        run: |
          python3 scripts/generate-llms.py --check
          python3 -m unittest discover scripts -v

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
